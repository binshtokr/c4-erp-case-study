name: Deploy C4 Diagrams to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Generate Structurizr site
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/avisi-cloud/structurizr-site-generatr
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate site from diagram.dsl
        run: |
          /opt/structurizr-site-generatr/bin/structurizr-site-generatr generate-site \
            -w diagram.dsl

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy generated site
        id: deployment
        uses: actions/deploy-pages@v4